<!DOCTYPE html>
<!-- build v18 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIco 6媒体プロンプト生成</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #f0f0f0;
    font-family: system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    -webkit-text-size-adjust: 100%;
  }
  .wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 24px;
  }
  h1 .accent { color: #e63946; }

  .label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 8px;
    color: #f0f0f0;
  }

  textarea {
    width: 100%;
    background: #1a1a1a;
    color: #f0f0f0;
    border: 1px solid #2c2c2c;
    border-radius: 8px;
    padding: 14px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #e63946; }

  #honmon { min-height: 300px; }

  .counter {
    text-align: right;
    font-size: 12px;
    color: #888;
    margin: 6px 0 24px;
  }

  .gen-btn {
    display: block;
    width: 100%;
    background: #e63946;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .gen-btn:hover { background: #cf2f3c; }
  .gen-btn:active { transform: translateY(1px); }

  #results { margin-top: 32px; }
  #results.hidden { display: none; }

  .card {
    background: #161616;
    border: 1px solid #2c2c2c;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: #e63946;
  }
  .card textarea {
    min-height: 150px;
    font-size: 13px;
    background: #0f0f0f;
  }
  .copy-btn {
    background: transparent;
    color: #f0f0f0;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: #e63946; }
  .copy-btn.copied { border-color: #2e9e4f; color: #5fd07f; }

  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: #555;
  }

  @media (max-width: 480px) {
    h1 { font-size: 18px; }
    .wrap { padding: 20px 12px 56px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="accent">AIco</span> 6媒体プロンプト生成</h1>

  <label class="label" for="honmon">note正本</label>
  <textarea id="honmon" placeholder="ここに note 正本を貼り付け / 入力"></textarea>
  <div class="counter"><span id="count">0</span> 文字</div>

  <button class="gen-btn" id="generate">🚀 6媒体プロンプト生成</button>

  <div id="results" class="hidden"></div>

  <footer>AIco · prompt generator · v18</footer>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "aico_note_honmon";
  var honmon = document.getElementById("honmon");
  var count = document.getElementById("count");
  var results = document.getElementById("results");
  var genBtn = document.getElementById("generate");

  // ---- restore from localStorage ----
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved !== null) honmon.value = saved;
  } catch (e) {}

  function updateCount() {
    count.textContent = honmon.value.length;
  }
  updateCount();

  honmon.addEventListener("input", function () {
    updateCount();
    try { localStorage.setItem(STORAGE_KEY, honmon.value); } catch (e) {}
  });

  // ---- 6 media prompt templates ----
  // {HONMON} is replaced with the current 正本 text.
  var MEDIA = [
    {
      name: "note",
      build: function (h) {
        return "【note正本】\n" + h;
      }
    },
    {
      name: "X（Twitter）",
      build: function (h) {
        return "以下のnote正本を、X（Twitter）投稿用に仕上げてください。\n\n" +
          "条件：\n" +
          "- 日本語\n" +
          "- 140字以内\n" +
          "- 全部説明しない。余韻を残す\n" +
          "- 続きはnoteで読みたくなる構成\n" +
          "- お世辞・前置き不要。投稿文のみ出力\n\n" +
          "【note正本】\n" + h;
      }
    },
    {
      name: "Instagram",
      build: function (h) {
        return "以下のnote正本を、Instagramカルーセル（5枚）に仕上げてください。\n\n" +
          "条件：\n" +
          "- Slide 1：Hook / 日本語\n" +
          "- Slide 2：Scene / 日本語\n" +
          "- Slide 3：Shift / English\n" +
          "- Slide 4：Insight / English\n" +
          "- Slide 5：Aftertaste + CTA / English\n" +
          "- 各スライド：短く・視覚主導・読ませるより止める\n" +
          "- 各スライドに画像生成プロンプトを2案\n" +
          "- スタイル：Apple keynote / Netflix documentary / Monocle\n\n" +
          "【note正本】\n" + h;
      }
    },
    {
      name: "LinkedIn",
      build: function (h) {
        return "以下のnote正本を、LinkedIn投稿用英語に仕上げてください。\n\n" +
          "条件：\n" +
          "- Executive tone / Media strategist tone\n" +
          "- Insight-driven、conclusion first\n" +
          "- Global business audience向け\n" +
          "- 日本語直訳・過度なプロモーションにしない\n" +
          "- お世辞・前置き不要。投稿文のみ出力\n\n" +
          "【note正本】\n" + h;
      }
    },
    {
      name: "Substack",
      build: function (h) {
        return "以下のnote正本を、Substack投稿用英語に仕上げてください。\n\n" +
          "条件：\n" +
          "- Essay tone / reflective / personal but professional\n" +
          "- Global media perspective\n" +
          "- 読者が続きを読みたくなる構成\n" +
          "- お世辞・前置き不要。本文のみ出力\n\n" +
          "【note正本】\n" + h;
      }
    },
    {
      name: "Medium",
      build: function (h) {
        return "以下のnote正本を、Medium記事用英語に仕上げてください。\n\n" +
          "条件：\n" +
          "- Article / column tone\n" +
          "- Clear argument\n" +
          "- International reader friendly\n" +
          "- Media / business / societyの含意を明確に\n" +
          "- お世辞・前置き不要。本文のみ出力\n\n" +
          "【note正本】\n" + h;
      }
    }
  ];

  function copyText(text, btn) {
    function done() {
      var original = btn.getAttribute("data-label");
      btn.textContent = "✅ Copied!";
      btn.classList.add("copied");
      setTimeout(function () {
        btn.textContent = original;
        btn.classList.remove("copied");
      }, 1500);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function () {
        fallbackCopy(text);
        done();
      });
    } else {
      fallbackCopy(text);
      done();
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
  }

  function render() {
    var h = honmon.value;
    results.innerHTML = "";
    MEDIA.forEach(function (m) {
      var prompt = m.build(h);

      var card = document.createElement("div");
      card.className = "card";

      var head = document.createElement("div");
      head.className = "card-head";

      var name = document.createElement("span");
      name.className = "card-name";
      name.textContent = m.name;

      var btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.type = "button";
      btn.textContent = "コピー";
      btn.setAttribute("data-label", "コピー");

      head.appendChild(name);
      head.appendChild(btn);

      var ta = document.createElement("textarea");
      ta.readOnly = true;
      ta.value = prompt;

      btn.addEventListener("click", function () {
        copyText(ta.value, btn);
      });

      card.appendChild(head);
      card.appendChild(ta);
      results.appendChild(card);
    });
    results.classList.remove("hidden");
  }

  genBtn.addEventListener("click", render);
})();
</script>
</body>
</html>
